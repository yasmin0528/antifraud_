batch_size: 64
hid_dim: 256
lr: 0.003
wd: 0.0001
n_layers: 2
dropout: [0.2, 0.1]
device: "cuda:0"
early_stopping: 10
seed: 2023
max_epochs: 15
gated: true

dataset: aml
data_path: ../AMLdataset.csv
split_mode: sender_account
val_size: 0.2
test_size: 0.2

# CA1 序列编码器
use_ca1: true
ca1_k: 10
ca1_hidden_dim: 64
ca1_aux_weight: 0.05
ca1_dropout: 0.1
ca1_input_fields: ["amount_norm", "log_amount", "tx_type_id", "time_diff"]
ca1_encoder_type: "gru"
ca1_pooling: "attention"
ca1_cache_path: data/cache/aml_ca1_k10.pt

# CA3 原型记忆
use_ca3: true
ca3_warmup_epochs: 3
ca3_num_prototypes: 16
ca3_init_method: minibatch_kmeans
ca3_init_split: train
ca3_init_label: positive_only
ca3_update: gradient
ca3_use_ema: false
ca3_use_group_id: false
ca3_temperature: 0.2
ca3_top_k: 3
ca3_diversity_weight: 0.001
ca3_diversity_margin: 0.5
ca3_fusion: gated_residual
ca3_gate_bias_init: -2.0
ca3_gate_bias_final: -1.0
ca3_anneal_epochs: 10
ca3_dead_threshold: 3
ca3_contrastive_weight: 0.1
ca3_contrastive_temperature: 0.1
ca3_entropy_gate_beta: 1.0

# MPFC 决策融合
use_mpfc: true
mpfc_hidden_dim: 64
mpfc_dropout: 0.1
mpfc_gate_bias_init: -2.0
mpfc_confidence_constrained: true
mpfc_aggregation: noisy_or

# RuleBank 规则引擎
rulebank_path: config/rulebank/aml_rulebank_v1.yaml
rulebank_force_generate: false
vllm_api_url: "http://localhost:23333/v1/completions"
vllm_model: "qwen"
vllm_max_tokens: 8192
vllm_temperature: 0.3
vllm_top_p: 0.95

# VTA 全局学习调节（默认开启）
use_vta: true
vta_lambda_fn: 5.0
vta_lambda_fp: 1.0
vta_prediction_weight: 1.0
vta_conflict_weight: 0.3
vta_entropy_weight: 0.3
vta_reweight_strength: 1.0
vta_reweight_max: 8.0
vta_ema_decay: 0.9
vta_state_temperature: 1.0
vta_enable_gate_feedback: true
vta_gate_strength: 0.5
vta_gate_bias_max: 0.5
vta_enable_ca3_feedback: true
vta_ca3_strength: 0.5
vta_ca3_scale_min: 0.8
vta_ca3_scale_max: 2.0
vta_enable_review: true

results_dir: results
nei_att_heads:
  aml: 1
